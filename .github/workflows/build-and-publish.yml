name: Build and Publish
run-name: Build and Publish → ${{ github.ref_name }} - @${{ github.actor }}

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  validate_input:
    name: Validate input
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.validate_semver.outputs.version }}
      is_prerelease: ${{ steps.validate_semver.outputs.prerelease != '' }}

    steps:
      - name: Validate input version
        id: validate_semver
        uses: matt-usurp/validate-semver@v2
        with:
          version: ${{ github.ref }}

  build_and_create_draft_release:
    name: Build & Create Draft Release
    needs: validate_input
    runs-on: ubuntu-latest

    outputs:
      release_id: ${{ steps.create_draft_release.outputs.id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Test
        run: |
          npm run test

      - name: Upload build artifacts
        id: upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts
          path: |
            dist-cjs
            dist-es
            dist-types
            LICENSE
            package-lock.json
            package.json
            README.md

      - name: Create draft GitHub Release
        id: create_draft_release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ needs.validate_input.outputs.is_prerelease }}
          append_body: false
          body: >
            # ${{ needs.validate_input.outputs.version }}

            [Workflow awaiting approval](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ## Release Notes

            TODO: Generate release notes

  approve_and_publish:
    name: Publish to NPM
    needs: build_and_create_draft_release
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-artifacts
          path: ./

      - name: Verify local directory contents
        run: ls -la

      - name: Set up Node.js & NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com/'
          scope: '@mytake2'
          always-auth: true

      - name: Publish to NPM
        run: |
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        id: publish_github_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          append_body: false
          body: |
            Package release complete!
            Approved: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
